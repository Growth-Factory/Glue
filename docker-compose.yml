# Docker Compose for Glue development
# Provides PostgreSQL with pgvector for integration testing.
#
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: glue
      POSTGRES_PASSWORD: glue
      POSTGRES_DB: glue_test
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glue -d glue_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
